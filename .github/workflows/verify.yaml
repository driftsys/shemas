name: Verify published site

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Check published URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build site
        run: ./scripts/publish

      - name: Verify URLs
        run: |
          base="https://driftsys.github.io/schemas/"
          fail=0

          for path in index.html index.md project/index.html project/index.md markspec/index.html markspec/index.md; do
            url="${base}${path}"
            status=$(curl -sL -o /dev/null -w '%{http_code}' "$url")
            if [ "$status" = "200" ]; then
              echo "OK $url"
            else
              echo "FAIL $url (HTTP $status)"
              fail=1
            fi
          done

          for f in $(find public -name 'v*.json'); do
            url="${base}${f#public/}"
            status=$(curl -sL -o /dev/null -w '%{http_code}' "$url")
            if [ "$status" = "200" ]; then
              echo "OK $url"
            else
              echo "FAIL $url (HTTP $status)"
              fail=1
            fi
          done
          exit $fail

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bash_unit
        run: |
          curl -sL https://raw.githubusercontent.com/pgrange/bash_unit/master/install.sh | bash
          sudo mv bash_unit /usr/local/bin/

      - name: Test schemas
        run: bash_unit project/tests/test_*.sh

      - name: Install dprint
        run: curl -fsSL https://dprint.dev/install.sh | sh

      - name: Check formatting
        run: ~/.dprint/bin/dprint check

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare pages
        run: ./scripts/publish

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

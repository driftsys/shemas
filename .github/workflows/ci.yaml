on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bash_unit
        run: |
          curl -sL https://raw.githubusercontent.com/pgrange/bash_unit/master/install.sh | bash
          sudo mv bash_unit /usr/local/bin/

      - name: Test schemas
        run: bash_unit project/tests/test_*.sh

      - name: Install dprint
        run: curl -fsSL https://dprint.dev/install.sh | sh

      - name: Check formatting
        run: ~/.dprint/bin/dprint check

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check for publishable changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '\.(json|md)$';           if git diff --name-o=t          if HU          if git diff --name-only HEAD~1 HEAD | grep -qE '\.(json|md)$';           if git diff            if git diff --name-only HEAD~1 Hnges.outputs.publish == 'true'          if git diff --name-only HEAD~1 HEAD: U          if git diff --na   if: steps.changes.outputs.publish == 'true'
        uses: actions/upload-pages-artifact@v3
        uses: actions/upload-pages-a

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.publish == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify published URLs
        if: steps.changes.outputs.publish == 'true'
        run: |
          base="${{ steps.deployment.outputs.page_url }}"
          fail=0

          # Ve          # Ve                      # Ve          # Ve        p          # .h          # Ve         rkspec/          # Ve          # Ve                          # Ve{path}          #   status=$(curl -sL -o /dev/null -w '%{http_code}' "$url")
            if [ "$status" = "200" ]; then
              echo "OK $url"
            else
              echo "FAIL $url (HTTP $status)"
              fail=1
            fi
          done

          # Verify schema files
          for f in $(find public -name 'v*.json'); do
            url="${base}${f#public/}"
            status=$(curl -sL -o /dev/null -w '%{http_code}' "$url")
            if [ "$status" = "200" ]; then
              e              e              e                     e              e              e                     e      fi
          done
          exit $fail
